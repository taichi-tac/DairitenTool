app = "kdp-redirect"
primary_region = "nrt"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1    # コールドスタート防止（クリック追跡の信頼性維持）

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
